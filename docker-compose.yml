name: ask-howard

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ask-howard
      POSTGRES_USER: ask-howard
      POSTGRES_PASSWORD: ask-howard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ask-howard"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      target: dev
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - go_cache:/go/pkg/mod
      - air_tmp:/app/tmp
    environment:
      DATABASE_URL: postgres://ask-howard:ask-howard@postgres:5432/ask-howard?sslmode=disable
      VITE_URL: http://web:5173
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    environment:
      API_URL: http://api:8080

  ci:
    build:
      context: .
      target: ci
    profiles: [ci]
    volumes:
      - .:/app
      - go_cache:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  go_cache:
  air_tmp:
  web_node_modules:
