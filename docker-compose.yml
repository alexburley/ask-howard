name: ask-howard

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ask-howard
      POSTGRES_USER: ask-howard
      POSTGRES_PASSWORD: ask-howard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ask-howard"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ask-howard
      MINIO_ROOT_PASSWORD: ask-howard-secret
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
      mc alias set local http://minio:9000 ask-howard ask-howard-secret &&
      mc mb --ignore-existing local/ask-howard-docs
      "

  migrate:
    build:
      context: .
      target: ci
    volumes:
      - .:/app
      - go_cache:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      atlas migrate apply
      --config file://internal/adapter/outbound/postgres/atlas.hcl
      --env local
      --var "database_url=postgres://ask-howard:ask-howard@postgres:5432/ask-howard?sslmode=disable"

  api:
    build:
      context: .
      target: dev
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - go_cache:/go/pkg/mod
      - air_tmp:/app/tmp
    environment:
      DATABASE_URL: postgres://ask-howard:ask-howard@postgres:5432/ask-howard?sslmode=disable
      VITE_URL: http://web:5173
      S3_ENDPOINT: http://minio:9000
      S3_PRESIGN_ENDPOINT: http://localhost:9000
      S3_BUCKET: ask-howard-docs
      S3_REGION: us-east-1
      S3_ACCESS_KEY: ask-howard
      S3_SECRET_KEY: ask-howard-secret
      S3_USE_PATH_STYLE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    environment:
      API_URL: http://api:8080
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5173 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  playwright:
    image: mcr.microsoft.com/playwright:v1.60.0-noble
    profiles: [e2e]
    working_dir: /app/web
    volumes:
      - .:/app
      - playwright_node_modules:/app/web/node_modules
    environment:
      BASE_URL: http://web:5173
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_started
    command: sh -c "npm ci && npx playwright test"

  ci:
    build:
      context: .
      target: ci
    profiles: [ci]
    volumes:
      - .:/app
      - go_cache:/go/pkg/mod
    environment:
      TEST_DATABASE_URL: postgres://ask-howard:ask-howard@postgres:5432/ask-howard?sslmode=disable
      TEST_S3_ENDPOINT: http://minio:9000
      TEST_S3_BUCKET: ask-howard-docs
      TEST_S3_REGION: us-east-1
      TEST_S3_ACCESS_KEY: ask-howard
      TEST_S3_SECRET_KEY: ask-howard-secret
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
  minio_data:
  go_cache:
  air_tmp:
  web_node_modules:
  playwright_node_modules:
