name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Build CI image (cached)
        uses: docker/build-push-action@v7
        with:
          context: .
          target: ci
          load: true
          tags: ask-howard-ci:latest
          cache-from: type=gha,scope=ci-image
          cache-to: type=gha,scope=ci-image,mode=max

      - name: Lint
        run: make lint

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Build CI image (cached)
        uses: docker/build-push-action@v7
        with:
          context: .
          target: ci
          load: true
          tags: ask-howard-ci:latest
          cache-from: type=gha,scope=ci-image
          cache-to: type=gha,scope=ci-image,mode=max

      - name: Unit tests
        run: make test-unit

  test-functional:
    name: Functional Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Build CI image (cached)
        uses: docker/build-push-action@v7
        with:
          context: .
          target: ci
          load: true
          tags: ask-howard-ci:latest
          cache-from: type=gha,scope=ci-image
          cache-to: type=gha,scope=ci-image,mode=max

      - name: Functional tests
        run: make test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Type check
        working-directory: web
        run: npx tsc --noEmit

      - name: Build
        working-directory: web
        run: npm run build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Build CI image (cached)
        uses: docker/build-push-action@v7
        with:
          context: .
          target: ci
          load: true
          tags: ask-howard-ci:latest
          cache-from: type=gha,scope=ci-image
          cache-to: type=gha,scope=ci-image,mode=max

      - name: Build API image (cached)
        uses: docker/build-push-action@v7
        with:
          context: .
          target: dev
          load: true
          tags: ask-howard-api:latest
          cache-from: type=gha,scope=dev-image
          cache-to: type=gha,scope=dev-image,mode=max

      - name: Build web image (cached)
        uses: docker/build-push-action@v7
        with:
          context: ./web
          file: ./web/Dockerfile.dev
          load: true
          tags: ask-howard-web:latest
          cache-from: type=gha,scope=web-dev-image
          cache-to: type=gha,scope=web-dev-image,mode=max

      - name: Start stack
        run: docker compose up --build --remove-orphans -d

      - name: Run e2e tests
        run: make e2e

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: web/test-results/
          if-no-files-found: ignore
